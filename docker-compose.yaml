services:
  postgres:
    image: postgres:16
    container_name: "llm_twin_postgres"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llm_twin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llm_twin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-llm_twin_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - local
    restart: always

  mongo:
    image: mongo:latest
    container_name: "database_llm_twin"
    logging:
      options:
        max-size: 1g
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db
    networks:
      - local
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: "llm_engineering_qdrant"
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - local
    restart: always


volumes:
  mongo_data:
  qdrant_data:
  postgres_data:

networks:
  local:
    driver: bridge